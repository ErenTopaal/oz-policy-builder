name: CI

on:
  push:
    branches:
      - main
      - "phase-*"
  pull_request:
    branches:
      - main
      - "phase-*"

# Cancel in-flight runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + nextest + deny
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # actions/checkout@v4 — pinned to commit SHA 34e114876b0b11c390a56381ad16ebd13914f8d5
      # (v4 tag, 2025-11-13, message "Cleanup actions/checkout@v6 auth style (#2305)").
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # dtolnay/rust-toolchain — pinned to commit SHA 3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
      # (master HEAD as of 2026-03-27, message "Add 1.94.1 patch release"). The exact
      # toolchain version is resolved from `rust-toolchain.toml` at the repo root,
      # which pins channel = 1.89.0.
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Install nextest at the exact pinned version. NEVER drop `--version` —
      # nextest 0.9.129+ requires rustc >= 1.91 (see plan.md Tech Stack row).
      - name: Install cargo-nextest (pinned)
        run: cargo install cargo-nextest --version =0.9.128 --locked

      - name: cargo nextest run
        run: cargo nextest run --workspace

      - name: Install cargo-deny (pinned)
        run: cargo install cargo-deny --version =0.19.6 --locked

      - name: cargo deny check
        run: cargo deny check
