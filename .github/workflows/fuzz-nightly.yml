# nightly cargo-fuzz run — codegen render + recorder decode targets.
# simhost target intentionally unwired (~10 iter/sec is too slow for useful coverage).
# 90m hard timeout. workflow_dispatch enabled for manual triggers.

name: Fuzz Nightly

on:
  schedule:
    # 03:00 utc, lands after the daily walkthroughs workflow.
    - cron: '0 3 * * *'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: cargo-fuzz (nightly) — codegen + recorder
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # actions/checkout@v4 sha-pinned, same as ci.yml.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # nightly toolchain needed for `-Z` sanitizer flags. workspace stays on 1.89.
      - name: Install nightly Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          # rust-src needed for sanitizer-instrumented std.
          components: rust-src

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/oz-policy-codegen/fuzz/target
            crates/oz-policy-recorder/fuzz/target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock', 'crates/*/fuzz/Cargo.toml') }}

      # `--locked` pins cargo-fuzz's transitive lockfile so libfuzzer can't drift.
      - name: Install cargo-fuzz (pinned)
        run: cargo install cargo-fuzz --version =0.13.1 --locked

      # 600s per target via `-max_total_time`. crash → non-zero exit, job fails.
      - name: Fuzz oz-policy-codegen / spec_to_wasm_panic_free
        run: cargo +nightly fuzz run spec_to_wasm_panic_free -- -max_total_time=600
        working-directory: crates/oz-policy-codegen/fuzz

      - name: Fuzz oz-policy-recorder / recording_decode_panic_free
        run: cargo +nightly fuzz run recording_decode_panic_free -- -max_total_time=600
        working-directory: crates/oz-policy-recorder/fuzz

      # on failure, upload libfuzzer corpus + crash + repro for both subcrates.
      - name: Upload crash corpus on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: fuzz-corpus
          path: |
            crates/oz-policy-codegen/fuzz/artifacts/**
            crates/oz-policy-codegen/fuzz/corpus/**
            crates/oz-policy-recorder/fuzz/artifacts/**
            crates/oz-policy-recorder/fuzz/corpus/**
          if-no-files-found: ignore
