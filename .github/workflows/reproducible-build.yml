# re-derive walkthrough wasms inside the pinned docker image and verify
# byte-equality with committed `wasm_hash.txt`. triggers: published release,
# `v*` tag push, manual workflow_dispatch.

name: Reproducible Build

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to embed in the manifest filename (e.g. v0.1.0)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a release-tagged run.

permissions:
  contents: write # for release-asset upload on success.

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  reproducible-build:
    name: Build image + re-derive WASMs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # actions/checkout@v4 sha-pinned (same as ci.yml).
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # full history so manifest's git.commit is the real release sha.
          fetch-depth: 0

      # resolve release tag: release.tag_name → ref_name (if v*) → input → short sha.
      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.ref_name }}" == v* ]]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="manual-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      # build image local-only — base + tarball shas already pin every input.
      - name: Build reproducible-build image
        run: |
          docker build \
            --tag "oz-policy-builder/reproducible:${{ steps.resolve_tag.outputs.tag }}" \
            --tag "oz-policy-builder/reproducible:latest" \
            --file ci/Dockerfile \
            ci

      # run the script inside the pinned image; manifest lands on the bind mount.
      - name: Run reproducible-build script inside image
        id: rebuild
        run: |
          mkdir -p .docker-cargo-home .docker-target
          docker run --rm \
            -v "$PWD:/work" \
            -v "$PWD/.docker-cargo-home:/root/.cargo" \
            -e CARGO_HOME=/root/.cargo \
            -e CARGO_TARGET_DIR=/work/.docker-target \
            "oz-policy-builder/reproducible:${{ steps.resolve_tag.outputs.tag }}" \
            -c "scripts/reproducible-build.sh '${{ steps.resolve_tag.outputs.tag }}'"

      # on failure, save divergent wasms + manifest + pinned hashes for review.
      - name: Collect failure diagnostics
        if: failure()
        shell: bash
        run: |
          set -e
          mkdir -p /tmp/repro-failure
          # save any partial manifest + re-derived wasms (best effort).
          cp -v reproducible-build-manifest-*.json /tmp/repro-failure/ 2>/dev/null || true
          if [ -d ".docker-target/wasm32-unknown-unknown/release" ]; then
            cp -v .docker-target/wasm32-unknown-unknown/release/*.wasm \
                  /tmp/repro-failure/ 2>/dev/null || true
          fi
          # pinned wasm_hash.txt files for diffability:
          find walkthroughs -name 'wasm_hash.txt' \
            -exec cp --parents -v {} /tmp/repro-failure/ \;
          echo "Files staged for upload:"
          ls -la /tmp/repro-failure

      - name: Upload failure diagnostics
        # actions/upload-artifact v4.6.0 sha-pinned.
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: failure()
        with:
          name: reproducible-build-failure-${{ steps.resolve_tag.outputs.tag }}
          path: /tmp/repro-failure
          if-no-files-found: warn
          retention-days: 30

      # upload manifest as workflow artifact + (on release event) attach to release.
      - name: Upload manifest as workflow artifact
        # actions/upload-artifact v4.6.0 sha-pinned.
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: success()
        with:
          name: reproducible-build-manifest-${{ steps.resolve_tag.outputs.tag }}
          path: reproducible-build-manifest-${{ steps.resolve_tag.outputs.tag }}.json
          if-no-files-found: error
          retention-days: 365

      # softprops/action-gh-release v2.6.2 sha-pinned.
      - name: Attach manifest to GitHub Release
        if: success() && github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: reproducible-build-manifest-${{ steps.resolve_tag.outputs.tag }}.json
          fail_on_unmatched_files: true
