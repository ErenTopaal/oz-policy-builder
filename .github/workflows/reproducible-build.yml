# reproducible-build.yml — re-derive every committed walkthrough WASM inside
# the pinned `ci/Dockerfile` image and verify byte-equality with the
# `wasm_hash.txt` files committed alongside each spec.
#
# Triggers:
#   * `release` event of type `published`  — runs on every tagged release and
#     attaches the manifest as a release asset.
#   * push of any `v*` tag                  — same surface as the release path,
#     covers the case where a tag is created via `git push origin <tag>`
#     before a Release object exists.
#   * manual `workflow_dispatch`            — lets maintainers re-run the
#     check against `main` or any branch without cutting a release.
#
# This workflow is the binary completion criterion for Phase 9 Stream C: the
# `reproducible-build.sh end-to-end check passes from a fresh clone on a
# second machine` (see plan.md § "Phase 9 — Security / Audit / Hardening").

name: Reproducible Build

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to embed in the manifest filename (e.g. v0.1.0)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # do NOT cancel a release-tagged run on retry

permissions:
  contents: write # needed for the release-asset upload step on success

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  reproducible-build:
    name: Build image + re-derive WASMs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # actions/checkout@v4 — pinned to the same commit SHA the rest of the
      # workflows use (see .github/workflows/ci.yml comment). Drift between
      # workflows is caught at a single pin location.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # full history so the manifest's `git.commit` is the real release
          # SHA, not a shallow synthetic commit.
          fetch-depth: 0

      # Compute the release tag the manifest filename + release-asset upload
      # should use. The order of preference:
      #   1. `release.tag_name`              (release event)
      #   2. `github.ref_name` if it starts with `v` (push of a `v*` tag)
      #   3. workflow_dispatch input (when provided)
      #   4. short git SHA (fallback for manual non-tag runs)
      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            tag="${{ github.event.release.tag_name }}"
          elif [[ "${{ github.ref_name }}" == v* ]]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="manual-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      # Build the reproducible-build image. We tag it with both the release
      # tag and `latest` so subsequent steps (and humans debugging a failed
      # release) can re-attach. Build is local-only — we do NOT push to a
      # registry, since the upstream stellar-cli tarball SHA + base-image
      # digest already pin every input.
      - name: Build reproducible-build image
        run: |
          docker build \
            --tag "oz-policy-builder/reproducible:${{ steps.resolve_tag.outputs.tag }}" \
            --tag "oz-policy-builder/reproducible:latest" \
            --file ci/Dockerfile \
            ci

      # Run scripts/reproducible-build.sh inside the image with the worktree
      # mounted read-write at /work. The script writes the manifest to the
      # workspace root, which surfaces back to the host via the bind mount.
      #
      # We forward CARGO_HOME / a tmpfs-backed scratch dir so the in-container
      # build does not have to round-trip cargo registry fetches through the
      # mounted target/ (which would dirty the host worktree).
      - name: Run reproducible-build script inside image
        id: rebuild
        run: |
          mkdir -p .docker-cargo-home .docker-target
          docker run --rm \
            -v "$PWD:/work" \
            -v "$PWD/.docker-cargo-home:/root/.cargo" \
            -e CARGO_HOME=/root/.cargo \
            -e CARGO_TARGET_DIR=/work/.docker-target \
            "oz-policy-builder/reproducible:${{ steps.resolve_tag.outputs.tag }}" \
            -c "scripts/reproducible-build.sh '${{ steps.resolve_tag.outputs.tag }}'"

      # Collect failure diagnostics: any divergent WASMs from /tmp + the
      # workspace's `target/` build log + any stderr the script captured.
      # On a hash mismatch the script exits non-zero; we still want the
      # *re-derived* WASM bytes uploaded as an artifact so reviewers can
      # `wasm-objdump` it locally without re-running the build.
      - name: Collect failure diagnostics
        if: failure()
        shell: bash
        run: |
          set -e
          mkdir -p /tmp/repro-failure
          # Save any partial manifest the script may have left behind.
          cp -v reproducible-build-manifest-*.json /tmp/repro-failure/ 2>/dev/null || true
          # Save the build log surfaced by the script. The docker step's
          # stdout/stderr already lives in the run log; we additionally
          # archive every re-derived policy.wasm that the codegen step
          # touched (the script writes them to a per-spec mktemp dir, but
          # we run it inside Docker, so those are lost — best-effort copy
          # of anything left in CARGO_TARGET_DIR).
          if [ -d ".docker-target/wasm32-unknown-unknown/release" ]; then
            cp -v .docker-target/wasm32-unknown-unknown/release/*.wasm \
                  /tmp/repro-failure/ 2>/dev/null || true
          fi
          # Pinned wasm_hash.txt files for diffability:
          find walkthroughs -name 'wasm_hash.txt' \
            -exec cp --parents -v {} /tmp/repro-failure/ \;
          echo "Files staged for upload:"
          ls -la /tmp/repro-failure

      - name: Upload failure diagnostics
        # actions/upload-artifact v4.6.0 — SHA verified against
        # https://api.github.com/repos/actions/upload-artifact/tags 2026-05-15.
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: failure()
        with:
          name: reproducible-build-failure-${{ steps.resolve_tag.outputs.tag }}
          path: /tmp/repro-failure
          if-no-files-found: warn
          retention-days: 30

      # Success path: upload the manifest as a workflow artifact (always)
      # and, when the workflow is firing on a release/push-tag event, attach
      # it to the release.
      - name: Upload manifest as workflow artifact
        # actions/upload-artifact v4.6.0 — same SHA as the failure path.
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: success()
        with:
          name: reproducible-build-manifest-${{ steps.resolve_tag.outputs.tag }}
          path: reproducible-build-manifest-${{ steps.resolve_tag.outputs.tag }}.json
          if-no-files-found: error
          retention-days: 365

      # Attach the manifest to the GitHub Release. Only runs on the
      # `release` event (where the release object already exists).
      # softprops/action-gh-release pinned to v2.6.2 — SHA verified against
      # https://api.github.com/repos/softprops/action-gh-release/tags 2026-05-15.
      - name: Attach manifest to GitHub Release
        if: success() && github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: reproducible-build-manifest-${{ steps.resolve_tag.outputs.tag }}.json
          fail_on_unmatched_files: true
