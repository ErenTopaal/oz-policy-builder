# tag-driven release pipeline. on push of v* tag:
# 1) cross-compile cli + mcp for 4 target/os pairs.
# 2) build walkthrough tarball.
# 3) create gh release with sha256sums, optionally gpg-signed.
# 4) publish crates in dep order: core → recorder → codegen → simhost → installer → cli → mcp.
# 5) publish wallet-adapter to npm.
# all third-party actions are sha-pinned.

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # for the gh release upload step.

env:
  CARGO_TERM_COLOR: always
  # warnings-clean build, mirrors ci.yml.
  RUSTFLAGS: "-D warnings"

jobs:
  # 1. build native binaries for 4 target/os pairs.
  build-binaries:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: oz-policy-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: oz-policy-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            asset: oz-policy-darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset: oz-policy-darwin-arm64

    steps:
      # actions/checkout v4, sha-pinned (same as ci.yml).
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # dtolnay/rust-toolchain sha-pinned (same as ci.yml).
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0
          targets: ${{ matrix.target }}

      # aarch64 linux needs the matching gnu linker.
      - name: Install aarch64 GNU cross-compiler
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo "[target.aarch64-unknown-linux-gnu]"
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml

      - name: Build oz-policy-cli + oz-policy-mcp (release)
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release \
            --target ${{ matrix.target }} \
            -p oz-policy-cli \
            -p oz-policy-mcp

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          out_dir="dist/${{ matrix.asset }}"
          mkdir -p "$out_dir"
          cp "target/${{ matrix.target }}/release/oz-policy-cli" "$out_dir/"
          cp "target/${{ matrix.target }}/release/oz-policy-mcp" "$out_dir/"
          cp LICENSE-APACHE NOTICE README.md "$out_dir/"
          tar -C dist -czf "${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"
          sha256sum "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.tar.gz.sha256"

      # actions/upload-artifact v4.6.0 sha-pinned.
      - name: Upload binary artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  # 2. build the walkthrough-bundle tarball.
  build-walkthrough-bundle:
    name: build walkthrough-bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Pack walkthroughs/
        shell: bash
        run: |
          set -euo pipefail
          # pack walkthroughs + license; exclude .tmp scratch dirs.
          tar --exclude='walkthroughs/**/.tmp' \
              -czf walkthrough-bundle.tar.gz \
              walkthroughs \
              docs/walkthroughs \
              LICENSE-APACHE NOTICE
          sha256sum walkthrough-bundle.tar.gz > walkthrough-bundle.tar.gz.sha256

      - name: Upload walkthrough-bundle artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: walkthrough-bundle
          path: |
            walkthrough-bundle.tar.gz
            walkthrough-bundle.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  # 3. publish gh release with tarballs + sha256sums.
  publish-release:
    name: publish GitHub Release
    needs: [build-binaries, build-walkthrough-bundle]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/download-artifact v4 sha-pinned.
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist

      - name: Stage release files + SHA256SUMS
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -name '*.tar.gz' -exec cp {} release/ \;
          # recompute over staged tarballs — defends against per-artifact drift.
          (
            cd release
            sha256sum *.tar.gz > SHA256SUMS
          )
          echo "files=$(ls release | wc -l)" >> "$GITHUB_OUTPUT"
          ls -la release

      # optional gpg signing — keyed by env-var indirection (secrets.* in if: is flaky).
      - name: GPG-sign SHA256SUMS (optional)
        env:
          RELEASE_GPG_KEY: ${{ secrets.RELEASE_GPG_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_GPG_KEY:-}" ]; then
            echo "::warning::RELEASE_GPG_KEY secret is unset; SHA256SUMS will not be GPG-signed."
            exit 0
          fi
          echo "$RELEASE_GPG_KEY" | gpg --batch --import
          # armored detached signature; verify with `gpg --verify SHA256SUMS.asc SHA256SUMS`.
          gpg --batch --yes \
              ${RELEASE_GPG_PASSPHRASE:+--pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE"} \
              --output release/SHA256SUMS.asc \
              --detach-sign --armor \
              release/SHA256SUMS

      # softprops/action-gh-release v2.6.2 sha-pinned.
      - name: Create release + upload assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Automated release built from the `${{ github.ref_name }}` tag.

            Verify with:
            ```
            sha256sum -c SHA256SUMS
            ```

            See `CHANGELOG.md` for the human-readable change list.

  # 4. publish crates.io in topo order: core → recorder → codegen → simhost →
  #    installer → cli → mcp.
  publish-crates:
    name: publish crates.io
    needs: [publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0

      - name: Guard on CARGO_REGISTRY_TOKEN
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN secret is unset; skipping crates.io publish."
            echo "skip=true" >> "$GITHUB_ENV"
          else
            echo "skip=false" >> "$GITHUB_ENV"
          fi

      - name: cargo publish (in dependency order)
        if: env.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          for crate in \
            oz-policy-core \
            oz-policy-recorder \
            oz-policy-codegen \
            oz-policy-simhost \
            oz-policy-installer \
            oz-policy-cli \
            oz-policy-mcp; do
            echo "::group::cargo publish -p $crate"
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"
            echo "::endgroup::"
            # wait for sparse-index refresh before the next member publish.
            sleep 30
          done

  # 5. publish wallet-adapter to npm.
  publish-npm:
    name: publish npm
    needs: [publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # pnpm/action-setup v4 sha-pinned.
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 9.15.2

      # actions/setup-node v4 sha-pinned.
      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Guard on NPM_TOKEN
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN secret is unset; skipping npm publish."
            echo "skip=true" >> "$GITHUB_ENV"
          else
            echo "skip=false" >> "$GITHUB_ENV"
          fi

      - name: Install deps + build
        if: env.skip == 'false'
        working-directory: wallet-adapter
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm run build

      - name: pnpm publish
        if: env.skip == 'false'
        working-directory: wallet-adapter
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # `--no-git-checks` — checkout step already pinned the tree.
          pnpm publish --access public --no-git-checks
