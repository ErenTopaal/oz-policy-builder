# release.yml — tag-driven publish pipeline for the OZ Accounts Policy
# Builder. Triggers on push of any `v*` tag and:
#
#   1. Cross-compiles `oz-policy-cli` + `oz-policy-mcp` for four
#      target/OS pairs (linux-amd64, linux-arm64, darwin-amd64, darwin-arm64)
#      and uploads each pair as a tarball.
#   2. Builds the walkthrough-bundle tarball (all three frozen walkthroughs
#      under `walkthroughs/`, plus their generated source/wasm).
#   3. Creates the GitHub Release, attaches every binary tarball + the
#      walkthrough bundle, and uploads a `SHA256SUMS` file derived from the
#      tarballs. Optionally GPG-signs the SHA256SUMS if `RELEASE_GPG_KEY` is
#      present; otherwise emits a `::warning::` line and continues.
#   4. Publishes each workspace crate to crates.io in the verified
#      dependency order:
#         oz-policy-core
#         oz-policy-recorder
#         oz-policy-codegen
#         oz-policy-simhost
#         oz-policy-installer
#         oz-policy-cli
#         oz-policy-mcp
#      The order was checked against each member's `[dependencies]` block
#      (oz-policy-simhost depends on -codegen and -core; oz-policy-installer
#      depends only on -core; -cli and -mcp depend on every leaf). Gated on
#      `CARGO_REGISTRY_TOKEN`.
#   5. Publishes `wallet-adapter/` to npm as
#      `@oz-policy-builder/wallet-adapter`. Gated on `NPM_TOKEN`.
#
# All third-party actions are SHA-pinned. Every `secrets.*` reference is a
# GitHub Actions expression — never a literal token.

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # for the GH Release upload step

env:
  CARGO_TERM_COLOR: always
  # Keep the workspace warnings-clean during the release build the same way
  # CI does, so a tag never silently ships warning-promoted code.
  RUSTFLAGS: "-D warnings"

jobs:
  # ---------------------------------------------------------------------
  # 1. Build native binaries for four target/OS pairs.
  # ---------------------------------------------------------------------
  build-binaries:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: oz-policy-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: oz-policy-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            asset: oz-policy-darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset: oz-policy-darwin-arm64

    steps:
      # actions/checkout v4 — SHA pinned to commit 34e114876b0b... (same pin
      # as ci.yml; see comment there).
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # dtolnay/rust-toolchain master HEAD — pinned to commit
      # 3c5f7ea28cd6... (same pin as ci.yml).
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0
          targets: ${{ matrix.target }}

      # cross-compilation for aarch64-unknown-linux-gnu needs the matching
      # GNU linker. We only install it on the cross matrix entry.
      - name: Install aarch64 GNU cross-compiler
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo "[target.aarch64-unknown-linux-gnu]"
            echo 'linker = "aarch64-linux-gnu-gcc"'
          } >> .cargo/config.toml

      - name: Build oz-policy-cli + oz-policy-mcp (release)
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release \
            --target ${{ matrix.target }} \
            -p oz-policy-cli \
            -p oz-policy-mcp

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          out_dir="dist/${{ matrix.asset }}"
          mkdir -p "$out_dir"
          cp "target/${{ matrix.target }}/release/oz-policy-cli" "$out_dir/"
          cp "target/${{ matrix.target }}/release/oz-policy-mcp" "$out_dir/"
          cp LICENSE-APACHE NOTICE README.md "$out_dir/"
          tar -C dist -czf "${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}"
          sha256sum "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.tar.gz.sha256"

      # actions/upload-artifact v4.6.0 — same SHA as reproducible-build.yml.
      - name: Upload binary artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------
  # 2. Build the walkthrough-bundle tarball.
  # ---------------------------------------------------------------------
  build-walkthrough-bundle:
    name: build walkthrough-bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Pack walkthroughs/
        shell: bash
        run: |
          set -euo pipefail
          # Include the frozen recording/spec/wasm/sim-report corpora plus
          # the top-level docs they reference. Excludes any local scratch
          # under `walkthroughs/**/.tmp` (none committed; defensive).
          tar --exclude='walkthroughs/**/.tmp' \
              -czf walkthrough-bundle.tar.gz \
              walkthroughs \
              docs/walkthroughs \
              LICENSE-APACHE NOTICE
          sha256sum walkthrough-bundle.tar.gz > walkthrough-bundle.tar.gz.sha256

      - name: Upload walkthrough-bundle artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: walkthrough-bundle
          path: |
            walkthrough-bundle.tar.gz
            walkthrough-bundle.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------
  # 3. Publish GitHub Release with all binary tarballs + bundle + SHA256SUMS.
  # ---------------------------------------------------------------------
  publish-release:
    name: publish GitHub Release
    needs: [build-binaries, build-walkthrough-bundle]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # actions/download-artifact v4 — SHA verified against
      # https://api.github.com/repos/actions/download-artifact/git/refs/tags/v4
      # (commit d3f86a106a0bac45b974a628896c90dbdf5c8093, v4.3.0 prep,
      # 2025-04-24).
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist

      - name: Stage release files + SHA256SUMS
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -name '*.tar.gz' -exec cp {} release/ \;
          # Recompute SHA256SUMS over the staged tarballs so a tampered
          # per-artifact .sha256 cannot drift from the actual bytes the
          # release page hosts.
          (
            cd release
            sha256sum *.tar.gz > SHA256SUMS
          )
          echo "files=$(ls release | wc -l)" >> "$GITHUB_OUTPUT"
          ls -la release

      # Optional GPG signing of SHA256SUMS. We deliberately key off the
      # presence of `secrets.RELEASE_GPG_KEY` via env-var indirection
      # (GitHub does not evaluate `secrets.*` inside `if:` predicates
      # reliably). If the secret is unset, the env var is empty and we
      # emit a `::warning::` line so the release page still ships, just
      # without an .asc signature.
      - name: GPG-sign SHA256SUMS (optional)
        env:
          RELEASE_GPG_KEY: ${{ secrets.RELEASE_GPG_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_GPG_KEY:-}" ]; then
            echo "::warning::RELEASE_GPG_KEY secret is unset; SHA256SUMS will not be GPG-signed."
            exit 0
          fi
          echo "$RELEASE_GPG_KEY" | gpg --batch --import
          # Sign as an armored detached signature so verifiers can run
          # `gpg --verify SHA256SUMS.asc SHA256SUMS`.
          gpg --batch --yes \
              ${RELEASE_GPG_PASSPHRASE:+--pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE"} \
              --output release/SHA256SUMS.asc \
              --detach-sign --armor \
              release/SHA256SUMS

      # softprops/action-gh-release v2.6.2 — SHA pinned (matches
      # reproducible-build.yml).
      - name: Create release + upload assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            Automated release built from the `${{ github.ref_name }}` tag.

            Verify with:
            ```
            sha256sum -c SHA256SUMS
            ```

            See `CHANGELOG.md` for the human-readable change list.

  # ---------------------------------------------------------------------
  # 4. Publish workspace crates to crates.io in the verified order.
  #
  # Dependency-graph reminder (verified 2026-05-16 against each member's
  # `[dependencies]`):
  #
  #   oz-policy-core       -- leaf (no internal deps)
  #   oz-policy-recorder   -- depends on: core
  #   oz-policy-codegen    -- depends on: core
  #   oz-policy-simhost    -- depends on: core, codegen
  #   oz-policy-installer  -- depends on: core
  #   oz-policy-cli        -- depends on: core, recorder, codegen, simhost,
  #                                       installer
  #   oz-policy-mcp        -- depends on: core, recorder, codegen, simhost,
  #                                       installer
  #
  # The publish order below is a valid topological linearisation.
  # ---------------------------------------------------------------------
  publish-crates:
    name: publish crates.io
    needs: [publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0

      - name: Guard on CARGO_REGISTRY_TOKEN
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN secret is unset; skipping crates.io publish."
            echo "skip=true" >> "$GITHUB_ENV"
          else
            echo "skip=false" >> "$GITHUB_ENV"
          fi

      - name: cargo publish (in dependency order)
        if: env.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          for crate in \
            oz-policy-core \
            oz-policy-recorder \
            oz-policy-codegen \
            oz-policy-simhost \
            oz-policy-installer \
            oz-policy-cli \
            oz-policy-mcp; do
            echo "::group::cargo publish -p $crate"
            cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"
            echo "::endgroup::"
            # crates.io's index sync is asynchronous; the next member
            # depends on this one resolving via the registry. Sleep long
            # enough for the sparse index to refresh.
            sleep 30
          done

  # ---------------------------------------------------------------------
  # 5. Publish wallet-adapter to npm.
  # ---------------------------------------------------------------------
  publish-npm:
    name: publish npm
    needs: [publish-release]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # pnpm/action-setup v4 — SHA pinned to the commit the v4 tag points at
      # (the tag itself is an annotated tag object; we use the underlying
      # commit SHA for deterministic verification).
      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 9.15.2

      # actions/setup-node v4 — SHA pinned.
      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Guard on NPM_TOKEN
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN secret is unset; skipping npm publish."
            echo "skip=true" >> "$GITHUB_ENV"
          else
            echo "skip=false" >> "$GITHUB_ENV"
          fi

      - name: Install deps + build
        if: env.skip == 'false'
        working-directory: wallet-adapter
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm run build

      - name: pnpm publish
        if: env.skip == 'false'
        working-directory: wallet-adapter
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # `--no-git-checks` because the tag-driven release flow doesn't
          # require pnpm to assert the working tree is clean — the
          # checkout step already pinned the exact tree to publish.
          pnpm publish --access public --no-git-checks
