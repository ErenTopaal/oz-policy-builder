# re-derives every walkthrough corpus on each pr and diffs against the frozen
# `expected-*.json` artifacts. covers synthesize (pure, no network), codegen
# (when wasm_hash.txt present), and simulate (when expected-sim-report.json present).
# skips: record (testnet retention) + install-envelope xdr (dynamic resource fees).
# discovery loop: iterates every walkthrough that carries `expected-spec-auto.json`.
# that have not yet been frozen are skipped silently — they will start
# picked up automatically once `expected-spec-auto.json` lands.

name: Walkthroughs

on:
  push:
    branches:
      - main
      - "phase-*"
  pull_request:
    branches:
      - main
      - "phase-*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  walkthroughs:
    name: Re-derive walkthrough corpora
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # actions/checkout@v4 sha-pinned (same as ci.yml).
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # dtolnay/rust-toolchain sha-pinned (channel comes from rust-toolchain.toml).
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: 1.89.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-walkthroughs-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

      # nextest pinned to same version as ci.yml.
      - name: Install cargo-nextest (pinned)
        run: cargo install cargo-nextest --version =0.9.128 --locked

      # jq is preinstalled on ubuntu-latest; canonicaliser script needs it.
      - name: Verify required CLI tools
        run: |
          jq --version
          which diff

      # build cli upfront — much faster than `cargo run` per walkthrough.
      - name: Build oz-policy-cli
        run: cargo build -p oz-policy-cli

      # per-walkthrough loop, discovered via `expected-spec-auto.json` marker.
      - name: Re-derive every frozen walkthrough corpus
        shell: bash
        run: |
          set -euo pipefail
          CLI=./target/debug/oz-policy-cli
          status=0
          shopt -s nullglob
          for dir in walkthroughs/[0-9][0-9]-*/; do
            name="$(basename "$dir")"
            spec_auto="$dir/expected-spec-auto.json"
            if [ ! -f "$spec_auto" ]; then
              echo "[skip] $name — no expected-spec-auto.json yet (Stream A freeze pending)"
              continue
            fi
            echo
            echo "=================================================="
            echo "Re-deriving walkthrough: $name"
            echo "=================================================="

            # prefer `expected-recording.json`, fall back to `recording.json`.
            recording=""
            if [ -f "$dir/expected-recording.json" ]; then
              recording="$dir/expected-recording.json"
            elif [ -f "$dir/recording.json" ]; then
              recording="$dir/recording.json"
            else
              echo "[fail] $name — no recording file (expected-recording.json | recording.json) next to spec"
              status=1
              continue
            fi

            # recover rule name from frozen spec for byte-equal output.
            rule_name="$(jq -r '.context_rule.name' "$spec_auto")"
            if [ -z "$rule_name" ] || [ "$rule_name" = "null" ]; then
              echo "[fail] $name — expected-spec-auto.json has no context_rule.name"
              status=1
              continue
            fi

            # recover lifetime; absent → don't pass the flag.
            lifetime="$(jq -r '.lifetime_ledgers // empty' "$spec_auto")"

            echo "[info] recording=$recording  rule_name=$rule_name  lifetime=${lifetime:-<none>}"

            # (1) synthesize auto → diff against expected-spec-auto.
            tmp_spec_auto="$(mktemp)"
            args=("synthesize" "$recording" "--mode" "auto" "--tightness" "exact" "--rule-name" "$rule_name")
            if [ -n "$lifetime" ]; then
              args+=("--lifetime" "$lifetime")
            fi
            if ! "$CLI" "${args[@]}" > "$tmp_spec_auto"; then
              echo "[fail] $name — synthesize --mode auto exited non-zero"
              status=1
              continue
            fi
            if ! diff <(jq -S . "$tmp_spec_auto") <(jq -S . "$spec_auto"); then
              echo "[fail] $name — re-derived spec differs from $spec_auto"
              status=1
            else
              echo "[ok] $name — auto-spec byte-equal"
            fi
            rm -f "$tmp_spec_auto"

            # (1b) synthesize compose-only when the expected file exists.
            spec_a="$dir/expected-spec-track-a.json"
            if [ -f "$spec_a" ]; then
              tmp_spec_a="$(mktemp)"
              args=("synthesize" "$recording" "--mode" "compose-only" "--tightness" "exact" "--rule-name" "$rule_name")
              if [ -n "$lifetime" ]; then
                args+=("--lifetime" "$lifetime")
              fi
              if ! "$CLI" "${args[@]}" > "$tmp_spec_a"; then
                echo "[fail] $name — synthesize --mode compose-only exited non-zero"
                status=1
              elif ! diff <(jq -S . "$tmp_spec_a") <(jq -S . "$spec_a"); then
                echo "[fail] $name — re-derived compose-only spec differs from $spec_a"
                status=1
              else
                echo "[ok] $name — track-a-spec byte-equal"
              fi
              rm -f "$tmp_spec_a"
            fi

            # (2) codegen → temp dir → diff each slot's wasm_hash.txt.
            # requires `stellar` cli; installed only when a wasm/ dir exists.
            if compgen -G "$dir/wasm/slot_*/wasm_hash.txt" > /dev/null; then
              if [ -z "${STELLAR_INSTALLED:-}" ]; then
                echo "[info] Installing stellar-cli for codegen verification"
                cargo install --locked --version 25.1.0 stellar-cli
                STELLAR_INSTALLED=1
              fi
              tmp_codegen="$(mktemp -d)"
              if ! "$CLI" codegen "$spec_auto" --out "$tmp_codegen" > /dev/null; then
                echo "[fail] $name — codegen exited non-zero"
                status=1
              else
                for hashfile in "$dir/wasm/"slot_*/wasm_hash.txt; do
                  slot="$(basename "$(dirname "$hashfile")")"
                  if [ ! -f "$tmp_codegen/$slot/wasm_hash.txt" ]; then
                    echo "[fail] $name — codegen produced no $slot/wasm_hash.txt"
                    status=1
                    continue
                  fi
                  if ! diff "$tmp_codegen/$slot/wasm_hash.txt" "$hashfile"; then
                    echo "[fail] $name — $slot wasm_hash mismatch"
                    status=1
                  else
                    echo "[ok] $name — $slot wasm_hash byte-equal"
                  fi
                done
              fi
              rm -rf "$tmp_codegen"
            fi

            # (3) simulate → diff against expected-sim-report.json.
            # ignore exit code — frozen corpora may legitimately pin a
            # deny-passed<deny-total state; report-file diff is the gate.
            sim_report="$dir/expected-sim-report.json"
            if [ -f "$sim_report" ] && [ -d "$dir/wasm" ]; then
              tmp_sim="$(mktemp)"
              "$CLI" simulate "$spec_auto" "$recording" --wasm-dir "$dir/wasm" --out "$tmp_sim" || true
              if [ ! -s "$tmp_sim" ]; then
                echo "[fail] $name — simulate produced no report file"
                status=1
              elif ! diff \
                  <(walkthroughs/canonicalize-sim-report.sh "$tmp_sim") \
                  <(walkthroughs/canonicalize-sim-report.sh "$sim_report"); then
                echo "[fail] $name — sim-report differs (post-canonicalize)"
                status=1
              else
                echo "[ok] $name — sim-report byte-equal (post-canonicalize)"
              fi
              rm -f "$tmp_sim"
            fi

            # (4) install-envelope: structural-equivalence only.
            # resource fee + footprint change every ledger; we only roundtrip
            # through `stellar-xdr decode`. full diff is a local-dev concern.
            for env_path in "$dir/expected-install-envelope.xdr"; do
              if [ -f "$env_path" ]; then
                if ! head -c 32 "$env_path" > /dev/null; then
                  echo "[fail] $name — envelope file $env_path unreadable"
                  status=1
                else
                  echo "[ok] $name — envelope file present ($(wc -c < "$env_path") bytes; structural decode skipped — see workflow comment)"
                fi
              fi
            done
          done

          echo
          if [ "$status" -ne 0 ]; then
            echo "Walkthroughs job FAILED — at least one re-derived artefact differed from its frozen counterpart."
            exit 1
          fi
          echo "All discovered walkthrough corpora are byte-equal to their frozen expected outputs."
