[package]
name = "oz-policy-core"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Core policy IR, decision tree, schema, and error types for the OZ Accounts Policy Builder."

[dependencies]
# Phase 1 only ships the canonical `Error` enum, which needs `thiserror` and
# nothing else. `serde`, `serde_json`, and `schemars` are kept declared at
# the workspace level (see top-level Cargo.toml) and will be re-introduced
# here in Phase 2 when `PolicySpec` IR + JSON Schema codegen land.
thiserror = { workspace = true }
