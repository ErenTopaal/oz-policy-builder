# fly.io app manifest for the hosted mcp endpoint. template — operator must
# adjust `app` (globally unique) and may adjust `primary_region` before
# `fly launch`.

# placeholder; rename before first `fly launch`.
app = "oz-policy-builder"  # <placeholder>.

# `iad` chosen for proximity to stellar rpc nodes. override per region list.
primary_region = "iad"  # <placeholder>.

[build]
  dockerfile = "Dockerfile.runtime"

[env]
  # non-secret defaults. bearer token MUST come via `fly secrets set`.
  RUST_LOG = "oz_policy_mcp=info,axum=info,tower_http=info"
  PORT = "8080"

# mcp serves POST /mcp + unauthenticated GET /healthz.
[[services]]
  protocol = "tcp"
  internal_port = 8080
  # auto-stop after idle; keep 1 warm so /healthz never times out.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  # cpu-bound surface (codegen + simhost) — refuse early instead of queueing.
  [services.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 25

  # fly anycast edge terminates tls.
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true
  # plain http redirects to https.
  [[services.ports]]
    port = 80
    handlers = ["http"]

  # active /healthz check.
  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    protocol = "http"
    # match only on status code; body is `{"status":"ok"}`.
    tls_skip_verify = false

# bump to 512mb / shared-cpu-2x if codegen/simhost requests start oom-killing.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
