# cargo-deny config. v2 schema — advisories deny-by-default.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
unmaintained = "workspace"
ignore = [
    # all three live in rustls-webpki 0.101.7 pinned via stellar-rpc-client
    # 25.1.0 → jsonrpsee-http-client → hyper-rustls → rustls 0.21.12.
    # upgrade requires bumping stellar-rpc-client; remove once that ships.
    # reachability: all three require misissued server cert / malformed CRL —
    # not in our threat model (operator-configured public-CA endpoints).
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]

[licenses]
# permissive licenses only. copyleft (GPL/AGPL/LGPL) is a stop-and-ask.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Apache-2.0 WITH LLVM-exception",
    "Zlib",
    "MIT-0",
    # mpl-2.0 — weak file-level copyleft, transitively via `option-ext` (dirs).
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
# warn (not deny) on multiple-versions — transitive churn is normal.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
